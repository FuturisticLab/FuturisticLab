<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Canvas Editor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            overflow: hidden;
        }
        .app-container {
            display: flex;
            height: 100vh;
        }
        .toolbar {
            width: 60px;
            background-color: #333;
            color: white;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .toolbar button {
            width: 48px;
            height: 48px;
            background-color: #555;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .toolbar button:hover {
            background-color: #777;
        }
        .toolbar button.active {
            background-color: #0078d7;
        }
        .toolbar button svg {
            width: 24px;
            height: 24px;
        }
        .workspace {
            flex: 1;
            position: relative;
            background-color: white;
            overflow: auto;
        }
        .canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 3000px;
            height: 3000px;
            background-image: 
                linear-gradient(#e1e1e1 1px, transparent 1px),
                linear-gradient(90deg, #e1e1e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .element {
            position: absolute;
            cursor: move;
            user-select: none;
            min-width: 20px;
            min-height: 20px;
        }
        .text-element {
            padding: 5px;
            outline: none;
            border: 1px dashed transparent;
        }
        .text-element:hover {
            border: 1px dashed #0078d7;
        }
        .shape-element {
            border: 2px solid #333;
            background-color: rgba(255, 255, 255, 0.7);
        }
        .shape-resize-handle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: white;
            border: 1px solid #0078d7;
            border-radius: 50%;
        }
        .top-left { top: -4px; left: -4px; cursor: nw-resize; }
        .top-right { top: -4px; right: -4px; cursor: ne-resize; }
        .bottom-left { bottom: -4px; left: -4px; cursor: sw-resize; }
        .bottom-right { bottom: -4px; right: -4px; cursor: se-resize; }
        
        .selected {
            outline: 2px solid #0078d7;
        }
        .line-element {
            position: absolute;
            cursor: move;
        }
        .line-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: white;
            border: 1px solid #0078d7;
            border-radius: 50%;
            margin-left: -5px;
            margin-top: -5px;
            cursor: move;
        }
        .image-element {
            position: absolute;
            cursor: move;
            border: 1px solid transparent;
        }
        .image-element:hover {
            border: 1px dashed #0078d7;
        }
        .image-element img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .toolbar-separator {
            width: 40px;
            height: 1px;
            background-color: #555;
            margin: 5px 0;
        }
        .color-picker {
            width: 30px;
            height: 30px;
            padding: 0;
            border: none;
            cursor: pointer;
        }
        .property-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 250px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 15px;
            display: none;
        }
        .property-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            color: #333;
        }
        .property-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .property-label {
            flex: 1;
            font-size: 14px;
        }
        .property-value {
            flex: 1;
        }
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 90px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 10px;
            display: flex;
            gap: 10px;
        }
        .controls button {
            background-color: #f0f0f0;
            border: none;
            border-radius: 3px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .controls button:hover {
            background-color: #e0e0e0;
        }
        .controls button.primary {
            background-color: #0078d7;
            color: white;
        }
        .controls button.primary:hover {
            background-color: #0067b8;
        }
        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 5px;
            display: flex;
            gap: 5px;
        }
        .zoom-controls button {
            width: 30px;
            height: 30px;
            background-color: #f0f0f0;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        .zoom-controls span {
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 14px;
        }
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 80px;
            right: 0;
            height: 20px;
            background-color: #f0f0f0;
            border-top: 1px solid #ddd;
            font-size: 12px;
            padding: 0 10px;
            display: flex;
            align-items: center;
        }
        #dropZone {
            border: 2px dashed #ccc;
            text-align: center;
            padding: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            display: none;
            background-color: rgba(255,255,255,0.9);
            z-index: 1000;
            border-radius: 5px;
        }
        .connection-line {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }
        .connector-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #0078d7;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <button id="selectTool" class="active" title="Select and Move">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 9l4 4l11-11l-4 17l-4-4l-3 4l-4-10z"></path>
                </svg>
            </button>
            <button id="textTool" title="Add Text">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 6.1H7V4h10v2.1zm-7.7 12v-12h-2.1v12h2.1zm4.5-12v12h2.1v-12h-2.1z" stroke="none" fill="currentColor"></path>
                </svg>
            </button>
            <button id="rectangleTool" title="Add Rectangle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="1"></rect>
                </svg>
            </button>
            <button id="circleTool" title="Add Circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="9"></circle>
                </svg>
            </button>
            <button id="lineTool" title="Add Line">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="19" x2="19" y2="5"></line>
                </svg>
            </button>
            <button id="arrowTool" title="Add Arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
            <button id="connectTool" title="Connect Elements">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M7 17L17 7"></path>
                    <circle cx="7" cy="17" r="3"></circle>
                    <circle cx="17" cy="7" r="3"></circle>
                </svg>
            </button>
            <div class="toolbar-separator"></div>
            <button id="imageTool" title="Add Image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </button>
            <div class="toolbar-separator"></div>
            <input type="color" id="strokeColor" value="#000000" class="color-picker" title="Stroke Color">
            <input type="color" id="fillColor" value="#ffffff" class="color-picker" title="Fill Color">
            <div class="toolbar-separator"></div>
            <button id="deleteTool" title="Delete Selected">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </button>
            <button id="clearCanvas" title="Clear Canvas">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="8" y1="16" x2="16" y2="8"></line>
                    <line x1="8" y1="8" x2="16" y2="16"></line>
                </svg>
            </button>
        </div>
        <div class="workspace">
            <div class="canvas" id="canvas"></div>
            
            <div id="dropZone">
                <p>Drop image here</p>
            </div>
            
            <div class="property-panel" id="propertyPanel">
                <h3>Properties</h3>
                <div id="elementProperties"></div>
            </div>
            
            <div class="controls">
                <button id="saveButton" class="primary">Save</button>
                <button id="loadButton">Load</button>
            </div>
            
            <div class="zoom-controls">
                <button id="zoomOut">−</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomIn">+</button>
            </div>
            
            <div class="status-bar">
                <span id="statusText">Ready</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize variables
            let currentTool = 'select';
            let currentElement = null;
            let isDragging = false;
            let isDrawing = false;
            let isResizing = false;
            let isConnecting = false;
            let startX, startY;
            let selectedElement = null;
            let resizeHandle = null;
            let elements = [];
            let nextId = 1;
            let scale = 1;
            let connections = [];
            let startElement = null;
            let tempLine = null;
            
            // DOM elements
            const canvas = document.getElementById('canvas');
            const toolButtons = document.querySelectorAll('.toolbar button');
            const selectTool = document.getElementById('selectTool');
            const textTool = document.getElementById('textTool');
            const rectangleTool = document.getElementById('rectangleTool');
            const circleTool = document.getElementById('circleTool');
            const lineTool = document.getElementById('lineTool');
            const arrowTool = document.getElementById('arrowTool');
            const connectTool = document.getElementById('connectTool');
            const imageTool = document.getElementById('imageTool');
            const deleteTool = document.getElementById('deleteTool');
            const clearCanvas = document.getElementById('clearCanvas');
            const saveButton = document.getElementById('saveButton');
            const loadButton = document.getElementById('loadButton');
            const strokeColor = document.getElementById('strokeColor');
            const fillColor = document.getElementById('fillColor');
            const zoomIn = document.getElementById('zoomIn');
            const zoomOut = document.getElementById('zoomOut');
            const zoomLevel = document.getElementById('zoomLevel');
            const statusText = document.getElementById('statusText');
            const propertyPanel = document.getElementById('propertyPanel');
            const elementProperties = document.getElementById('elementProperties');
            const dropZone = document.getElementById('dropZone');
            
            // Set up event listeners for tools
            toolButtons.forEach(button => {
                button.addEventListener('click', function() {
                    toolButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    const toolId = this.id;
                    currentTool = toolId.replace('Tool', '');
                    updateStatus(`Tool: ${currentTool}`);
                    deselectAll();
                    
                    if (currentTool === 'image') {
                        const fileInput = document.createElement('input');
                        fileInput.type = 'file';
                        fileInput.accept = 'image/*';
                        fileInput.click();
                        
                        fileInput.addEventListener('change', function(event) {
                            const file = event.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = function(e) {
                                    addImageElement(e.target.result, 100, 100);
                                };
                                reader.readAsDataURL(file);
                            }
                        });
                        
                        selectTool.click();
                    }
                });
            });
            
            // Canvas event listeners
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            
            // Clear canvas event listener
            clearCanvas.addEventListener('click', function() {
                if (confirm('Are you sure you want to clear the canvas? This action cannot be undone.')) {
                    while (canvas.firstChild) {
                        canvas.removeChild(canvas.firstChild);
                    }
                    elements = [];
                    connections = [];
                    nextId = 1;
                    updateStatus('Canvas cleared');
                }
            });
            
            // Save and load event listeners
            saveButton.addEventListener('click', saveCanvas);
            loadButton.addEventListener('click', loadCanvas);
            
            // Delete tool event listener
            deleteTool.addEventListener('click', function() {
                if (selectedElement) {
                    deleteElement(selectedElement);
                    selectedElement = null;
                    hidePropertyPanel();
                    updateStatus('Element deleted');
                } else {
                    updateStatus('No element selected');
                }
            });
            
            // Zoom controls
            zoomIn.addEventListener('click', function() {
                scale = Math.min(scale + 0.1, 3);
                updateZoom();
            });
            
            zoomOut.addEventListener('click', function() {
                scale = Math.max(scale - 0.1, 0.1);
                updateZoom();
            });
            
            // Set up drag and drop for images
            document.addEventListener('dragover', function(e) {
                e.preventDefault();
                dropZone.style.display = 'block';
            });
            
            document.addEventListener('dragleave', function(e) {
                if (!e.relatedTarget || e.relatedTarget.id !== 'dropZone') {
                    dropZone.style.display = 'none';
                }
            });
            
            dropZone.addEventListener('dragover', function(e) {
                e.preventDefault();
            });
            
            dropZone.addEventListener('drop', function(e) {
                e.preventDefault();
                dropZone.style.display = 'none';
                
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        addImageElement(e.target.result, e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
                    };
                    reader.readAsDataURL(files[0]);
                }
            });
            
            // Function to update status bar
            function updateStatus(text) {
                statusText.textContent = text;
            }
            
            // Mouse event handlers
            function onMouseDown(e) {
                startX = e.clientX - canvas.getBoundingClientRect().left;
                startY = e.clientY - canvas.getBoundingClientRect().top;
                
                // Adjust for zoom
                startX /= scale;
                startY /= scale;
                
                if (currentTool === 'select') {
                    const clickedElement = getElementAtPosition(startX, startY);
                    
                    if (clickedElement) {
                        // Check if we're clicking on a resize handle
                        const handle = getResizeHandleAtPosition(clickedElement, startX, startY);
                        if (handle) {
                            isResizing = true;
                            resizeHandle = handle;
                            selectElement(clickedElement);
                        } else {
                            // Start dragging the element
                            isDragging = true;
                            selectElement(clickedElement);
                            
                            // Calculate offset
                            const elX = parseFloat(clickedElement.style.left);
                            const elY = parseFloat(clickedElement.style.top);
                            startX = startX - elX;
                            startY = startY - elY;
                        }
                    } else {
                        deselectAll();
                    }
                } else if (currentTool === 'text') {
                    const textElement = addTextElement('Text', startX, startY);
                    selectElement(textElement);
                    textElement.focus();
                    currentTool = 'select';
                    selectTool.click();
                } else if (currentTool === 'rectangle') {
                    isDrawing = true;
                    currentElement = addRectangleElement(startX, startY, 0, 0);
                } else if (currentTool === 'circle') {
                    isDrawing = true;
                    currentElement = addCircleElement(startX, startY, 0);
                } else if (currentTool === 'line' || currentTool === 'arrow') {
                    isDrawing = true;
                    currentElement = addLineElement(startX, startY, startX, startY, currentTool === 'arrow');
                } else if (currentTool === 'connect' && selectedElement) {
                    startElement = selectedElement;
                    isConnecting = true;
                    tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    tempLine.classList.add('connection-line');
                    tempLine.style.position = 'absolute';
                    tempLine.style.width = '100%';
                    tempLine.style.height = '100%';
                    tempLine.style.left = '0';
                    tempLine.style.top = '0';
                    tempLine.style.pointerEvents = 'none';
                    tempLine.innerHTML = `<path d="M${startX},${startY} L${startX},${startY}" stroke="black" stroke-width="2" fill="none" />`;
                    canvas.appendChild(tempLine);
                }
            }
            
            function onMouseMove(e) {
                const mouseX = (e.clientX - canvas.getBoundingClientRect().left) / scale;
                const mouseY = (e.clientY - canvas.getBoundingClientRect().top) / scale;
                
                if (isDragging && selectedElement) {
                    const newX = mouseX - startX;
                    const newY = mouseY - startY;
                    selectedElement.style.left = newX + 'px';
                    selectedElement.style.top = newY + 'px';
                    
                    // Update connections
                    updateConnections(selectedElement);
                    
                } else if (isResizing && selectedElement) {
                    const elX = parseFloat(selectedElement.style.left);
                    const elY = parseFloat(selectedElement.style.top);
                    const elWidth = parseFloat(selectedElement.style.width);
                    const elHeight = parseFloat(selectedElement.style.height);
                    
                    let newWidth = elWidth;
                    let newHeight = elHeight;
                    let newX = elX;
                    let newY = elY;
                    
                    if (resizeHandle.classList.contains('top-left')) {
                        newWidth = elWidth + (elX - mouseX);
                        newHeight = elHeight + (elY - mouseY);
                        newX = mouseX;
                        newY = mouseY;
                    } else if (resizeHandle.classList.contains('top-right')) {
                        newWidth = mouseX - elX;
                        newHeight = elHeight + (elY - mouseY);
                        newY = mouseY;
                    } else if (resizeHandle.classList.contains('bottom-left')) {
                        newWidth = elWidth + (elX - mouseX);
                        newHeight = mouseY - elY;
                        newX = mouseX;
                    } else if (resizeHandle.classList.contains('bottom-right')) {
                        newWidth = mouseX - elX;
                        newHeight = mouseY - elY;
                    }
                    
                    if (newWidth >= 10 && newHeight >= 10) {
                        selectedElement.style.width = newWidth + 'px';
                        selectedElement.style.height = newHeight + 'px';
                        selectedElement.style.left = newX + 'px';
                        selectedElement.style.top = newY + 'px';
                        
                        // Update connections
                        updateConnections(selectedElement);
                    }
                    
                } else if (isDrawing && currentElement) {
                    if (currentTool === 'rectangle') {
                        const width = mouseX - startX;
                        const height = mouseY - startY;
                        
                        // Handle negative width/height for dragging in different directions
                        const x = width < 0 ? mouseX : startX;
                        const y = height < 0 ? mouseY : startY;
                        const absWidth = Math.abs(width);
                        const absHeight = Math.abs(height);
                        
                        currentElement.style.left = x + 'px';
                        currentElement.style.top = y + 'px';
                        currentElement.style.width = absWidth + 'px';
                        currentElement.style.height = absHeight + 'px';
                        
                    } else if (currentTool === 'circle') {
                        const dx = mouseX - startX;
                        const dy = mouseY - startY;
                        const radius = Math.sqrt(dx * dx + dy * dy);
                        
                        currentElement.style.width = radius * 2 + 'px';
                        currentElement.style.height = radius * 2 + 'px';
                        currentElement.style.left = (startX - radius) + 'px';
                        currentElement.style.top = (startY - radius) + 'px';
                        currentElement.style.borderRadius = '50%';
                        
                    } else if (currentTool === 'line' || currentTool === 'arrow') {
                        const line = currentElement.querySelector('svg');
                        if (line) {
                            if (currentTool === 'line') {
                                line.innerHTML = `<line x1="0" y1="0" x2="${mouseX - startX}" y2="${mouseY - startY}" stroke="${strokeColor.value}" stroke-width="2" />`;
                            } else {
                                // Arrow
                                const dx = mouseX - startX;
                                const dy = mouseY - startY;
                                const angle = Math.atan2(dy, dx);
                                const length = Math.sqrt(dx * dx + dy * dy);
                                const arrowSize = 10;
                                
                                const x2 = length;
                                const y2 = 0;
                                
                                const arrowX1 = x2 - arrowSize * Math.cos(angle - Math.PI / 6);
                                const arrowY1 = y2 - arrowSize * Math.sin(angle - Math.PI / 6);
                                const arrowX2 = x2 - arrowSize * Math.cos(angle + Math.PI / 6);
                                const arrowY2 = y2 - arrowSize * Math.sin(angle + Math.PI / 6);
                                
                                line.style.transform = `rotate(${angle}rad)`;
                                line.innerHTML = `
                                    <line x1="0" y1="0" x2="${length}" y2="0" stroke="${strokeColor.value}" stroke-width="2" />
                                    <polygon points="${x2},${y2} ${arrowX1},${arrowY1} ${arrowX2},${arrowY2}" fill="${strokeColor.value}" />
                                `;
                            }
                            
                            // Update size to encompass the line
                            const width = Math.abs(mouseX - startX);
                            const height = Math.abs(mouseY - startY);
                            currentElement.style.width = Math.max(width, 20) + 'px';
                            currentElement.style.height = Math.max(height, 20) + 'px';
                            
                            // Update direction
                            if (mouseX < startX) {
                                currentElement.style.left = mouseX + 'px';
                            }
                            if (mouseY < startY) {
                                currentElement.style.top = mouseY + 'px';
                            }
                        }
                    }
                } else if (isConnecting && tempLine) {
                    const path = tempLine.querySelector('path');
                    const cx = startElement ? getCenterX(startElement) : startX;
                    const cy = startElement ? getCenterY(startElement) : startY;
                    path.setAttribute('d', `M${cx},${cy} L${mouseX},${mouseY}`);
                    
                    // Highlight potential target element
                    const targetElement = getElementAtPosition(mouseX, mouseY);
                    deselectAll(true); // Keep start element selected
                    if (targetElement && targetElement !== startElement) {
                        targetElement.classList.add('selected');
                    }
                }
            }
            
            function onMouseUp(e) {
                const mouseX = (e.clientX - canvas.getBoundingClientRect().left) / scale;
                const mouseY = (e.clientY - canvas.getBoundingClientRect().top) / scale;
                
                if (isDrawing) {
                    isDrawing = false;
                    
                    // Minimum size check
                    if (currentElement) {
                        const width = parseFloat(currentElement.style.width) || 0;
                        const height = parseFloat(currentElement.style.height) || 0;
                        
                        if (width < 10 || height < 10) {
                            // Remove tiny elements
                            if (currentElement.parentNode === canvas) {
                                canvas.removeChild(currentElement);
                            }
                        } else {
                            currentElement.id = 'element-' + nextId++;
                            elements.push(currentElement);
                            
                            // Add resize handles for shapes
                            if (currentTool === 'rectangle' || currentTool === 'circle') {
                                addResizeHandles(currentElement);
                            }
                            
                            // Add connection points for lines
                            if (currentTool === 'line' || currentTool === 'arrow') {
                                addLineHandles(currentElement);
                            }
                            
                            selectElement(currentElement);
                            currentTool = 'select';
                            selectTool.click();
                        }
                        
                        currentElement = null;
                    }
                } else if (isConnecting) {
                    isConnecting = false;
                    
                    if (tempLine) {
                        canvas.removeChild(tempLine);
                        tempLine = null;
                    }
                    
                    const targetElement = getElementAtPosition(mouseX, mouseY);
                    if (startElement && targetElement && startElement !== targetElement) {
                        createConnection(startElement, targetElement);
                        updateStatus('Connection created');
                    }
                    
                    startElement = null;
                }
                
                isDragging = false;
                isResizing = false;
                resizeHandle = null;
                
                // If an element is selected, show properties
                if (selectedElement) {
                    showPropertyPanel(selectedElement);
                } else {
                    hidePropertyPanel();
                }
            }
            
            // Function to add a text element
            function addTextElement(text, x, y) {
                const element = document.createElement('div');
                element.classList.add('element', 'text-element');
                element.contentEditable = true;
                element.style.left = x + 'px';
                element.style.top = y + 'px';
                element.style.color = strokeColor.value;
                element.style.backgroundColor = 'transparent';
                element.textContent = text;
                element.dataset.type = 'text';
                canvas.appendChild(element);
                
                element.addEventListener('focus', function() {
                    selectElement(element);
                });
                
                return element;
            }
            
            // Function to add a rectangle element
            function addRectangleElement(x, y, width, height) {
                const element = document.createElement('div');
                element.classList.add('element', 'shape-element');
                element.style.left = x + 'px';
                element.style.top = y + 'px';
                element.style.width = width + 'px';
                element.style.height = height + 'px';
                element.style.borderColor = strokeColor.value;
                element.style.backgroundColor = fillColor.value;
                element.dataset.type = 'rectangle';
                canvas.appendChild(element);
                return element;
            }
            
            // Function to add a circle element
            function addCircleElement(x, y, radius) {
                const element = document.createElement('div');
                element.classList.add('element', 'shape-element');
                element.style.left = (x - radius) + 'px';
                element.style.top = (y - radius) + 'px';
                element.style.width = (radius * 2) + 'px';
                element.style.height = (radius * 2) + 'px';
                element.style.borderRadius = '50%';
                element.style.borderColor = strokeColor.value;
                element.style.backgroundColor = fillColor.value;
                element.dataset.type = 'circle';
                canvas.appendChild(element);
                return element;
            }
            
            // Function to add a line element
            function addLineElement(x1, y1, x2, y2, isArrow = false) {
                const width = Math.abs(x2 - x1);
                const height = Math.abs(y2 - y1);
                
                const element = document.createElement('div');
                element.classList.add('element', 'line-element');
                element.style.left = Math.min(x1, x2) + 'px';
                element.style.top = Math.min(y1, y2) + 'px';
                element.style.width = Math.max(width, 1) + 'px';
                element.style.height = Math.max(height, 1) + 'px';
                element.dataset.type = isArrow ? 'arrow' : 'line';
                element.dataset.x1 = x1;
                element.dataset.y1 = y1;
                element.dataset.x2 = x2;
                element.dataset.y2 = y2;
                
                // Create SVG for line
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.style.width = '100%';
                svg.style.height = '100%';
                svg.style.overflow = 'visible';
                
                if (isArrow) {
                    svg.innerHTML = `<line x1="0" y1="0" x2="0" y2="0" stroke="${strokeColor.value}" stroke-width="2" />
                                    <polygon points="0,0 0,0 0,0" fill="${strokeColor.value}" />`;
                } else {
                    svg.innerHTML = `<line x1="0" y1="0" x2="0" y2="0" stroke="${strokeColor.value}" stroke-width="2" />`;
                }
                
                element.appendChild(svg);
                canvas.appendChild(element);
                
                return element;
            }
            
            // Function to add an image element
            function addImageElement(src, x, y) {
                const element = document.createElement('div');
                element.classList.add('element', 'image-element');
                element.style.left = x + 'px';
                element.style.top = y + 'px';
                element.style.width = '200px';
                element.style.height = '150px';
                element.dataset.type = 'image';
                
                const img = document.createElement('img');
                img.src = src;
                img.alt = 'Uploaded image';
                img.draggable = false;
                
                element.appendChild(img);
                canvas.appendChild(element);
                
                setTimeout(() => {
                    selectElement(element);
                    addResizeHandles(element);
                }, 100);
                
                return element;
            }
            
            // Function to add resize handles to an element
            function addResizeHandles(element) {
                // Remove existing handles first
                const existingHandles = element.querySelectorAll('.shape-resize-handle');
                existingHandles.forEach(handle => handle.remove());
                
                const positions = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];
                positions.forEach(pos => {
                    const handle = document.createElement('div');
                    handle.classList.add('shape-resize-handle', pos);
                    element.appendChild(handle);
                });
            }
            
            // Function to add handles to line endpoints
            function addLineHandles(element) {
                // Remove existing handles first
                const existingHandles = element.querySelectorAll('.line-handle');
                existingHandles.forEach(handle => handle.remove());
                
                const start = document.createElement('div');
                start.classList.add('line-handle', 'start-handle');
                start.style.left = '0';
                start.style.top = '0';
                element.appendChild(start);
                
                const end = document.createElement('div');
                end.classList.add('line-handle', 'end-handle');
                end.style.left = '100%';
                end.style.top = '100%';
                element.appendChild(end);
            }
            
            // Function to create a connection between two elements
            function createConnection(sourceEl, targetEl) {
                const connection = {
                    id: `connection-${connections.length}`,
                    source: sourceEl.id,
                    target: targetEl.id
                };
                
                connections.push(connection);
                drawConnection(connection);
            }
            
            // Function to draw a connection line
            function drawConnection(connection) {
                const sourceEl = document.getElementById(connection.source);
                const targetEl = document.getElementById(connection.target);
                
                if (!sourceEl || !targetEl) return;
                
                // Remove existing connection
                const existingLine = document.getElementById(connection.id);
                if (existingLine) {
                    existingLine.remove();
                }
                
                // Create SVG for connection
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.id = connection.id;
                svg.classList.add('connection-line');
                svg.style.position = 'absolute';
                svg.style.width = '100%';
                svg.style.height = '100%';
                svg.style.left = '0';
                svg.style.top = '0';
                svg.style.pointerEvents = 'none';
                svg.style.zIndex = '1';
                
                // Calculate start and end points
                const x1 = getCenterX(sourceEl);
                const y1 = getCenterY(sourceEl);
                const x2 = getCenterX(targetEl);
                const y2 = getCenterY(targetEl);
                
                // Create path
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M${x1},${y1} L${x2},${y2}`);
                path.setAttribute('stroke', '#0078d7');
                path.setAttribute('stroke-width', '2');
                path.setAttribute('fill', 'none');
                path.setAttribute('marker-end', 'url(#arrowhead)');
                
                // Create arrowhead marker
                const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                marker.setAttribute('id', 'arrowhead');
                marker.setAttribute('markerWidth', '10');
                marker.setAttribute('markerHeight', '7');
                marker.setAttribute('refX', '9');
                marker.setAttribute('refY', '3.5');
                marker.setAttribute('orient', 'auto');
                
                const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                polygon.setAttribute('points', '0 0, 10 3.5, 0 7');
                polygon.setAttribute('fill', '#0078d7');
                
                marker.appendChild(polygon);
                defs.appendChild(marker);
                svg.appendChild(defs);
                svg.appendChild(path);
                
                canvas.appendChild(svg);
            }
            
            // Function to update all connections for an element
            function updateConnections(element) {
                connections.forEach(conn => {
                    if (conn.source === element.id || conn.target === element.id) {
                        drawConnection(conn);
                    }
                });
            }
            
            // Helper function to get center X of an element
            function getCenterX(element) {
                const rect = element.getBoundingClientRect();
                const canvasRect = canvas.getBoundingClientRect();
                return (rect.left + rect.width / 2 - canvasRect.left) / scale;
            }
            
            // Helper function to get center Y of an element
            function getCenterY(element) {
                const rect = element.getBoundingClientRect();
                const canvasRect = canvas.getBoundingClientRect();
                return (rect.top + rect.height / 2 - canvasRect.top) / scale;
            }
            
            // Function to get element at position
            function getElementAtPosition(x, y) {
                // Check in reverse order to get the top-most element
                for (let i = elements.length - 1; i >= 0; i--) {
                    const element = elements[i];
                    const rect = element.getBoundingClientRect();
                    const canvasRect = canvas.getBoundingClientRect();
                    
                    const elLeft = (rect.left - canvasRect.left) / scale;
                    const elTop = (rect.top - canvasRect.top) / scale;
                    const elRight = elLeft + rect.width / scale;
                    const elBottom = elTop + rect.height / scale;
                    
                    if (x >= elLeft && x <= elRight && y >= elTop && y <= elBottom) {
                        return element;
                    }
                }
                return null;
            }
            
            // Function to get resize handle at position
            function getResizeHandleAtPosition(element, x, y) {
                const handles = element.querySelectorAll('.shape-resize-handle');
                const canvasRect = canvas.getBoundingClientRect();
                
                for (let i = 0; i < handles.length; i++) {
                    const handle = handles[i];
                    const rect = handle.getBoundingClientRect();
                    
                    const handleLeft = (rect.left - canvasRect.left) / scale;
                    const handleTop = (rect.top - canvasRect.top) / scale;
                    const handleRight = handleLeft + rect.width / scale;
                    const handleBottom = handleTop + rect.height / scale;
                    
                    if (x >= handleLeft && x <= handleRight && y >= handleTop && y <= handleBottom) {
                        return handle;
                    }
                }
                return null;
            }
            
            // Function to select an element
            function selectElement(element) {
                deselectAll();
                selectedElement = element;
                element.classList.add('selected');
                
                if (element.dataset.type === 'rectangle' || element.dataset.type === 'circle' || element.dataset.type === 'image') {
                    addResizeHandles(element);
                }
                
                if (element.dataset.type === 'line' || element.dataset.type === 'arrow') {
                    addLineHandles(element);
                }
                
                showPropertyPanel(element);
            }
            
            // Function to deselect all elements
            function deselectAll(keepStartElement = false) {
                elements.forEach(el => {
                    if (!keepStartElement || el !== startElement) {
                        el.classList.remove('selected');
                    }
                });
                
                if (!keepStartElement) {
                    selectedElement = null;
                    hidePropertyPanel();
                }
            }
            
            // Function to delete an element
            function deleteElement(element) {
                // Remove connections associated with this element
                connections = connections.filter(conn => {
                    if (conn.source === element.id || conn.target === element.id) {
                        const connEl = document.getElementById(conn.id);
                        if (connEl) connEl.remove();
                        return false;
                    }
                    return true;
                });
                
                // Remove the element
                canvas.removeChild(element);
                elements = elements.filter(el => el !== element);
            }
            
            // Function to show property panel
            function showPropertyPanel(element) {
                propertyPanel.style.display = 'block';
                
                // Clear existing properties
                elementProperties.innerHTML = '';
                
                const type = element.dataset.type;
                
                if (type === 'text') {
                    addPropertyRow('Text Color', createColorInput(element.style.color, value => {
                        element.style.color = value;
                    }));
                    
                    addPropertyRow('Font Size', createFontSizeInput(window.getComputedStyle(element).fontSize, value => {
                        element.style.fontSize = value + 'px';
                    }));
                    
                    addPropertyRow('Background', createColorInput(element.style.backgroundColor || 'transparent', value => {
                        element.style.backgroundColor = value;
                    }));
                }
                
                if (type === 'rectangle' || type === 'circle') {
                    addPropertyRow('Border Color', createColorInput(element.style.borderColor, value => {
                        element.style.borderColor = value;
                    }));
                    
                    addPropertyRow('Fill Color', createColorInput(element.style.backgroundColor, value => {
                        element.style.backgroundColor = value;
                    }));
                    
                    addPropertyRow('Border Width', createNumberInput(parseInt(element.style.borderWidth) || 2, 1, 10, value => {
                        element.style.borderWidth = value + 'px';
                    }));
                }
                
                if (type === 'line' || type === 'arrow') {
                    const svg = element.querySelector('svg');
                    const line = svg.querySelector('line');
                    
                    addPropertyRow('Line Color', createColorInput(line.getAttribute('stroke'), value => {
                        line.setAttribute('stroke', value);
                        if (type === 'arrow') {
                            const polygon = svg.querySelector('polygon');
                            if (polygon) polygon.setAttribute('fill', value);
                        }
                    }));
                    
                    addPropertyRow('Line Width', createNumberInput(parseInt(line.getAttribute('stroke-width')) || 2, 1, 10, value => {
                        line.setAttribute('stroke-width', value);
                    }));
                }
                
                addPropertyRow('Position X', createNumberInput(parseInt(element.style.left) || 0, 0, 3000, value => {
                    element.style.left = value + 'px';
                    updateConnections(element);
                }));
                
                addPropertyRow('Position Y', createNumberInput(parseInt(element.style.top) || 0, 0, 3000, value => {
                    element.style.top = value + 'px';
                    updateConnections(element);
                }));
                
                if (type !== 'line' && type !== 'arrow') {
                    addPropertyRow('Width', createNumberInput(parseInt(element.style.width) || 100, 10, 1000, value => {
                        element.style.width = value + 'px';
                        updateConnections(element);
                    }));
                    
                    addPropertyRow('Height', createNumberInput(parseInt(element.style.height) || 100, 10, 1000, value => {
                        element.style.height = value + 'px';
                        updateConnections(element);
                    }));
                }
            }
            
            // Function to hide property panel
            function hidePropertyPanel() {
                propertyPanel.style.display = 'none';
            }
            
            // Function to add a property row
            function addPropertyRow(label, inputElement) {
                const row = document.createElement('div');
                row.classList.add('property-row');
                
                const labelEl = document.createElement('div');
                labelEl.classList.add('property-label');
                labelEl.textContent = label;
                
                const valueEl = document.createElement('div');
                valueEl.classList.add('property-value');
                valueEl.appendChild(inputElement);
                
                row.appendChild(labelEl);
                row.appendChild(valueEl);
                
                elementProperties.appendChild(row);
            }
            
            // Function to create a color input
            function createColorInput(initialValue, onChange) {
                const input = document.createElement('input');
                input.type = 'color';
                input.value = initialValue === 'transparent' ? '#ffffff' : initialValue;
                input.style.width = '100%';
                
                input.addEventListener('input', function() {
                    onChange(this.value);
                });
                
                return input;
            }
            
            // Function to create a number input
            function createNumberInput(initialValue, min, max, onChange) {
                const input = document.createElement('input');
                input.type = 'number';
                input.value = initialValue;
                input.min = min;
                input.max = max;
                
                input.addEventListener('change', function() {
                    onChange(parseInt(this.value));
                });
                
                return input;
            }
            
            // Function to create a font size input
            function createFontSizeInput(initialValue, onChange) {
                const input = document.createElement('input');
                input.type = 'number';
                input.value = parseInt(initialValue);
                input.min = 8;
                input.max = 72;
                
                input.addEventListener('change', function() {
                    onChange(parseInt(this.value));
                });
                
                return input;
            }
            
            // Function to update zoom
            function updateZoom() {
                canvas.style.transform = `scale(${scale})`;
                canvas.style.transformOrigin = 'top left';
                zoomLevel.textContent = Math.round(scale * 100) + '%';
            }
            
            // Function to save canvas
            function saveCanvas() {
                const data = {
                    elements: [],
                    connections: connections
                };
                
                elements.forEach(el => {
                    const elementData = {
                        id: el.id,
                        type: el.dataset.type,
                        left: parseFloat(el.style.left),
                        top: parseFloat(el.style.top),
                        width: parseFloat(el.style.width),
                        height: parseFloat(el.style.height)
                    };
                    
                    // Save type-specific properties
                    if (el.dataset.type === 'text') {
                        elementData.text = el.textContent;
                        elementData.color = el.style.color;
                        elementData.fontSize = el.style.fontSize;
                        elementData.backgroundColor = el.style.backgroundColor;
                    } else if (el.dataset.type === 'rectangle' || el.dataset.type === 'circle') {
                        elementData.borderColor = el.style.borderColor;
                        elementData.backgroundColor = el.style.backgroundColor;
                        elementData.borderWidth = el.style.borderWidth;
                        
                        if (el.dataset.type === 'circle') {
                            elementData.borderRadius = el.style.borderRadius;
                        }
                    } else if (el.dataset.type === 'line' || el.dataset.type === 'arrow') {
                        const svg = el.querySelector('svg');
                        const line = svg.querySelector('line');
                        elementData.strokeColor = line.getAttribute('stroke');
                        elementData.strokeWidth = line.getAttribute('stroke-width');
                    } else if (el.dataset.type === 'image') {
                        const img = el.querySelector('img');
                        elementData.src = img.src;
                    }
                    
                    data.elements.push(elementData);
                });
                
                // Save as JSON
                const jsonString = JSON.stringify(data);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                // Create download link
                const a = document.createElement('a');
                a.href = url;
                a.download = 'canvas-' + new Date().toISOString().slice(0, 10) + '.json';
                a.click();
                
                // Clean up
                URL.revokeObjectURL(url);
                updateStatus('Canvas saved');
            }
            
            // Function to load canvas
            function loadCanvas() {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'application/json';
                fileInput.click();
                
                fileInput.addEventListener('change', function(event) {
                    const file = event.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            try {
                                const data = JSON.parse(e.target.result);
                                loadCanvasData(data);
                                updateStatus('Canvas loaded');
                            } catch (error) {
                                alert('Error loading file: ' + error.message);
                            }
                        };
                        reader.readAsText(file);
                    }
                });
            }
            
            // Function to load canvas data
            function loadCanvasData(data) {
                // Clear current canvas
                while (canvas.firstChild) {
                    canvas.removeChild(canvas.firstChild);
                }
                
                elements = [];
                connections = [];
                nextId = 1;
                
                // Load elements
                if (data.elements && Array.isArray(data.elements)) {
                    data.elements.forEach(el => {
                        let element;
                        
                        if (el.type === 'text') {
                            element = addTextElement(el.text || 'Text', el.left, el.top);
                            element.style.color = el.color || '#000000';
                            element.style.fontSize = el.fontSize || '16px';
                            element.style.backgroundColor = el.backgroundColor || 'transparent';
                        } else if (el.type === 'rectangle') {
                            element = addRectangleElement(el.left, el.top, el.width, el.height);
                            element.style.borderColor = el.borderColor || '#000000';
                            element.style.backgroundColor = el.backgroundColor || '#ffffff';
                            element.style.borderWidth = el.borderWidth || '2px';
                        } else if (el.type === 'circle') {
                            element = addCircleElement(el.left + el.width / 2, el.top + el.height / 2, el.width / 2);
                            element.style.borderColor = el.borderColor || '#000000';
                            element.style.backgroundColor = el.backgroundColor || '#ffffff';
                            element.style.borderWidth = el.borderWidth || '2px';
                        } else if (el.type === 'line' || el.type === 'arrow') {
                            element = addLineElement(el.left, el.top, el.left + el.width, el.top + el.height, el.type === 'arrow');
                            const svg = element.querySelector('svg');
                            const line = svg.querySelector('line');
                            if (line) {
                                line.setAttribute('stroke', el.strokeColor || '#000000');
                                line.setAttribute('stroke-width', el.strokeWidth || '2');
                            }
                            
                            if (el.type === 'arrow') {
                                const polygon = svg.querySelector('polygon');
                                if (polygon) {
                                    polygon.setAttribute('fill', el.strokeColor || '#000000');
                                }
                            }
                        } else if (el.type === 'image' && el.src) {
                            element = addImageElement(el.src, el.left, el.top);
                            element.style.width = el.width + 'px';
                            element.style.height = el.height + 'px';
                        }
                        
                        if (element) {
                            element.id = el.id;
                            if (parseInt(el.id.split('-')[1]) >= nextId) {
                                nextId = parseInt(el.id.split('-')[1]) + 1;
                            }
                            elements.push(element);
                        }
                    });
                }
                
                // Load connections
                if (data.connections && Array.isArray(data.connections)) {
                    connections = data.connections;
                    connections.forEach(conn => {
                        drawConnection(conn);
                    });
                }
                
                deselectAll();
            }
            
            // Initialize with select tool active
            selectTool.click();
            updateStatus('Ready');
        });
    </script>
</body>
</html>
